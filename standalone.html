<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QMS Portal - 2026 Operations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/motion@10.16.2/dist/motion.js"></script>
    <style>
        :root {
            --background: #000000;
            --surface-1: #0A0A0A;
            --surface-2: #141414;
            --surface-3: #1F1F1F;
            --primary: #007AFF;
            --border-1: #1A1A1A;
            --border-2: #262626;
            --text-primary: #FFFFFF;
            --text-secondary: #A1A1A1;
            --text-tertiary: #525252;
        }

        body {
            background-color: var(--background);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 10px; }
        
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .nav-link.active {
            background: rgba(0, 122, 255, 0.1);
            color: var(--primary);
            border-right: 3px solid var(--primary);
        }

        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="fixed left-0 top-0 h-full w-64 bg-[#050505] border-r border-[#141414] flex flex-col py-8 z-50">
        <div class="px-8 mb-12">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-[#007AFF] rounded-xl flex items-center justify-center shadow-lg shadow-[#007AFF]/20">
                    <i data-lucide="shield-check" class="w-6 h-6 text-white"></i>
                </div>
                <div>
                    <h1 class="font-black text-xl tracking-tighter leading-none">OBSIDIAN</h1>
                    <p class="text-[9px] uppercase tracking-[0.3em] text-[#525252] font-black mt-1">DTE SYSTEMS</p>
                </div>
            </div>
        </div>

        <nav class="flex-1">
            <div onclick="navigateTo('dashboard')" class="nav-link flex items-center gap-4 px-8 py-4 cursor-pointer text-sm font-black uppercase tracking-widest text-[#525252] hover:text-white transition-all active">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
            </div>
            <div onclick="navigateTo('projects')" class="nav-link flex items-center gap-4 px-8 py-4 cursor-pointer text-sm font-black uppercase tracking-widest text-[#525252] hover:text-white transition-all">
                <i data-lucide="briefcase" class="w-4 h-4"></i> Projects
            </div>
            <div onclick="navigateTo('timeline')" class="nav-link flex items-center gap-4 px-8 py-4 cursor-pointer text-sm font-black uppercase tracking-widest text-[#525252] hover:text-white transition-all">
                <i data-lucide="calendar" class="w-4 h-4"></i> Timeline
            </div>
            <div onclick="navigateTo('audits')" class="nav-link flex items-center gap-4 px-8 py-4 cursor-pointer text-sm font-black uppercase tracking-widest text-[#525252] hover:text-white transition-all">
                <i data-lucide="clipboard-check" class="w-4 h-4"></i> Audits
            </div>
        </nav>
    </aside>

    <!-- Top Bar -->
    <header class="fixed top-0 left-64 right-0 h-20 border-b border-[#141414] flex items-center justify-between px-10 z-40 bg-black/50 backdrop-blur-xl">
        <div class="relative w-96">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-[#525252] w-4 h-4"></i>
            <input type="text" placeholder="Search across operations..." class="w-full bg-[#0A0A0A] border border-[#1F1F1F] rounded-xl pl-12 pr-4 py-2.5 text-sm outline-none focus:border-[#007AFF] transition-all">
        </div>
        <div class="flex items-center gap-6">
            <button onclick="navigateTo('new-project')" class="bg-[#007AFF] text-white px-6 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest hover:brightness-110 transition-all shadow-lg shadow-[#007AFF]/20">
                Register Project
            </button>
            <div class="w-px h-6 bg-[#1F1F1F]"></div>
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-[#141414] border border-[#262626] flex items-center justify-center">
                    <i data-lucide="user" class="w-5 h-5 text-[#A1A1A1]"></i>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content wrapper -->
    <main class="ml-64 mt-20 p-10 min-h-screen">
        
        <!-- PAGE: Dashboard -->
        <div id="page-dashboard" class="page active space-y-10">
            <div class="flex justify-between items-end">
                <div>
                    <h1 class="text-4xl font-black tracking-tighter uppercase">Dashboard</h1>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 h-[700px]">
                <!-- Kanban: Ongoing -->
                <div class="bg-[#0A0A0A] border border-[#141414] rounded-2xl flex flex-col overflow-hidden">
                    <div class="p-6 border-b border-[#141414] bg-[#0F0F0F]/50 flex justify-between items-center">
                        <span class="text-[10px] font-black uppercase tracking-[0.2em] text-[#A1A1A1]">In Progress</span>
                        <div id="count-ongoing" class="text-[10px] font-mono text-[#525252] bg-[#141414] px-2 py-0.5 rounded">0</div>
                    </div>
                    <div id="kanban-ongoing" class="flex-1 p-4 space-y-4 overflow-y-auto custom-scrollbar"></div>
                </div>

                <!-- Kanban: On Hold -->
                <div class="bg-[#0A0A0A] border border-[#141414] rounded-2xl flex flex-col overflow-hidden">
                    <div class="p-6 border-b border-[#141414] bg-[#0F0F0F]/50 flex justify-between items-center text-amber-500">
                        <span class="text-[10px] font-black uppercase tracking-[0.2em]">Suspended / On Hold</span>
                        <div id="count-onhold" class="text-[10px] font-mono bg-amber-500/10 px-2 py-0.5 rounded">0</div>
                    </div>
                    <div id="kanban-onhold" class="flex-1 p-4 space-y-4 overflow-y-auto custom-scrollbar"></div>
                </div>

                <!-- Kanban: Completed -->
                <div class="bg-[#0A0A0A] border border-[#141414] rounded-2xl flex flex-col overflow-hidden">
                    <div class="p-6 border-b border-[#141414] bg-[#0F0F0F]/50 flex justify-between items-center text-emerald-500">
                        <span class="text-[10px] font-black uppercase tracking-[0.2em]">Finalized / Review</span>
                        <div id="count-completed" class="text-[10px] font-mono bg-emerald-500/10 px-2 py-0.5 rounded">0</div>
                    </div>
                    <div id="kanban-completed" class="flex-1 p-4 space-y-4 overflow-y-auto custom-scrollbar"></div>
                </div>
            </div>
        </div>

        <!-- PAGE: Projects -->
        <div id="page-projects" class="page space-y-10">
            <h1 class="text-4xl font-black tracking-tighter uppercase">Project Inventory</h1>
            <div class="bg-[#0A0A0A] border border-[#141414] rounded-2xl overflow-hidden shadow-2xl">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-[#0F0F0F] border-b border-[#1F1F1F]">
                        <tr>
                            <th class="px-8 py-5 text-[10px] uppercase font-black text-[#525252] tracking-widest">Tracking ID</th>
                            <th class="px-8 py-5 text-[10px] uppercase font-black text-[#525252] tracking-widest">Configuration</th>
                            <th class="px-8 py-5 text-[10px] uppercase font-black text-[#525252] tracking-widest">Status</th>
                            <th class="px-8 py-5 text-[10px] uppercase font-black text-[#525252] tracking-widest">Staffing</th>
                            <th class="px-8 py-5 text-[10px] uppercase font-black text-[#525252] tracking-widest text-right">Progress</th>
                        </tr>
                    </thead>
                    <tbody id="projects-table-body" class="divide-y divide-[#141414]"></tbody>
                </table>
            </div>
        </div>

        <!-- PAGE: Timeline -->
        <div id="page-timeline" class="page space-y-10">
            <h1 class="text-4xl font-black tracking-tighter uppercase">Annual Process Timeline</h1>
            <div class="bg-[#0A0A0A] border border-[#141414] rounded-2xl p-8 shadow-2xl overflow-x-auto custom-scrollbar">
                <div class="min-w-[1200px]">
                    <div id="timeline-header" class="grid grid-cols-[300px_repeat(12,1fr)] border-b border-[#1F1F1F] pb-4 mb-4"></div>
                    <div id="timeline-rows" class="space-y-6"></div>
                </div>
            </div>
        </div>

        <!-- PAGE: Project Detail -->
        <div id="page-project-detail" class="page space-y-10 max-w-5xl mx-auto">
            <button onclick="window.history.back()" class="flex items-center gap-2 text-[#525252] hover:text-white transition-all uppercase text-[10px] font-black group">
                <i data-lucide="chevron-left" class="w-4 h-4 group-hover:-translate-x-1 transition-transform"></i> Return to previous
            </button>
            <div id="detail-content"></div>
        </div>

        <!-- PAGE: New Project -->
        <div id="page-new-project" class="page max-w-3xl mx-auto space-y-10">
            <h1 class="text-4xl font-black tracking-tighter uppercase">New Project</h1>
            <div class="bg-[#0A0A0A] border border-[#141414] rounded-2xl p-10 shadow-2xl">
                <form id="new-project-form" onsubmit="handleNewProject(event)" class="grid grid-cols-2 gap-8">
                    <div class="col-span-2 space-y-2">
                        <label class="text-[10px] font-black text-[#525252] uppercase tracking-widest">Loadcase Name</label>
                        <input type="text" name="name" required class="w-full bg-[#141414] border border-[#262626] rounded-xl px-4 py-3 outline-none focus:border-[#007AFF] text-sm font-bold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-[#525252] uppercase tracking-widest">DI44 Owner</label>
                        <input type="text" name="owner" required class="w-full bg-[#141414] border border-[#262626] rounded-xl px-4 py-3 outline-none focus:border-[#007AFF] text-sm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-[#525252] uppercase tracking-widest">Technical Delegate</label>
                        <input type="text" name="responsible" required class="w-full bg-[#141414] border border-[#262626] rounded-xl px-4 py-3 outline-none focus:border-[#007AFF] text-sm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-[#525252] uppercase tracking-widest">Carline</label>
                        <select name="carline" class="w-full bg-[#141414] border border-[#262626] rounded-xl px-4 py-3 outline-none focus:border-[#007AFF] text-sm font-bold">
                            <option value="V581">V581</option>
                            <option value="VV214">VV214</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-[#525252] uppercase tracking-widest">DPT Phase</label>
                        <select name="dptPhase" class="w-full bg-[#141414] border border-[#262626] rounded-xl px-4 py-3 outline-none focus:border-[#007AFF] text-sm font-bold">
                            <option value="DPT-A">DPT-A</option>
                            <option value="DPT-V">DPT-V</option>
                            <option value="DPT-E">DPT-E</option>
                            <option value="DPT-S">DPT-S</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-[#525252] uppercase tracking-widest">Planned Start</label>
                        <input type="date" name="plannedStart" required class="w-full bg-[#141414] border border-[#262626] rounded-xl px-4 py-3 outline-none focus:border-[#007AFF] text-sm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-[#525252] uppercase tracking-widest">Planned End</label>
                        <input type="date" name="plannedEnd" required class="w-full bg-[#141414] border border-[#262626] rounded-xl px-4 py-3 outline-none focus:border-[#007AFF] text-sm">
                    </div>
                    <div class="col-span-2 pt-6">
                        <button type="submit" class="w-full bg-[#007AFF] text-white py-4 rounded-xl font-black uppercase text-xs tracking-[0.2em] shadow-xl shadow-[#007AFF]/20 hover:scale-[1.02] transition-all">Establish Project Baseline</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- PAGE: Chekkai Form -->
        <div id="page-chekkai" class="page max-w-3xl mx-auto space-y-10">
            <button onclick="window.history.back()" class="flex items-center gap-2 text-[#525252] hover:text-white transition-all uppercase text-[10px] font-black group">
                <i data-lucide="chevron-left" class="w-4 h-4 group-hover:-translate-x-1 transition-transform"></i> Project Detail
            </button>
            <div id="chekkai-content"></div>
        </div>

        <!-- PAGE: Audits (Placeholder based on your app) -->
        <div id="page-audits" class="page space-y-10">
            <h1 class="text-4xl font-black tracking-tighter uppercase">Audits & Compliance</h1>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="audits-container"></div>
        </div>

    </main>

    <script>
        // --- DATA LAYER ---
        let projects = [
            { id: 'PRJ-2026-001', code: 'PRJ-2026-001', name: 'Motorbewegung', owner: 'Roderick Kraus', responsiblePerson: 'Alex Miller', status: 'In Progress', plannedStart: '2026-01-10', plannedEnd: '2026-03-15', actualStart: '2026-01-12', actualEnd: '', progress: 65, priority: 'High', carline: 'V581', dptPhase: 'DPT-A', preprocessingChekkai: true, modelChekkai: true, resultsChekkai: false, onHoldPeriods: [] },
            { id: 'PRJ-2026-014', code: 'PRJ-2026-014', name: 'LKW', owner: 'Helmut Lutsch', responsiblePerson: 'Sarah Connor', status: 'On Hold', plannedStart: '2026-02-05', plannedEnd: '2026-04-10', actualStart: '2026-02-08', actualEnd: '', progress: 22, priority: 'High', carline: 'VV214', dptPhase: 'DPT-S', onHoldPeriods: [{start: '2026-03-01', end: '2026-03-15'}], preprocessingChekkai: false, modelChekkai: false, resultsChekkai: false },
            { id: 'PRJ-2026-088', code: 'PRJ-2026-088', name: 'BS-Up', owner: 'Daniel Zander', responsiblePerson: 'Mike Ross', status: 'Completed', plannedStart: '2026-01-05', plannedEnd: '2026-02-20', actualStart: '2026-01-05', actualEnd: '2026-02-18', progress: 100, priority: 'Critical', carline: 'V581', dptPhase: 'DPT-V', preprocessingChekkai: true, modelChekkai: true, resultsChekkai: true, onHoldPeriods: [] },
            { id: 'PRJ-2026-102', code: 'PRJ-2026-102', name: 'CPS', owner: 'Franz Raban', responsiblePerson: 'Jessica Day', status: 'To be started', plannedStart: '2026-03-10', plannedEnd: '2026-04-20', actualStart: '', actualEnd: '', progress: 0, priority: 'Low', carline: 'VV214', dptPhase: 'DPT-E', preprocessingChekkai: false, modelChekkai: false, resultsChekkai: false, onHoldPeriods: [] }
        ];

        const audits = [
            { time: '16:45 PM - TODAY', event: 'Security Protocol Updated', desc: 'Revised encryption standards for DI44 data transmission.', color: 'bg-[#007AFF]' },
            { time: '14:20 PM - TODAY', event: 'CAPA Process Initiated', desc: 'A new Corrective Action Plan was triggered for Lab-B finding #FR-882.', color: 'bg-[#007AFF]' },
            { time: '09:30 AM - TODAY', event: 'Critical Non-Conformance', desc: 'Detected temperature deviation in storage unit ST-04.', color: 'bg-red-500' }
        ];

        // --- CORE LOGIC ---
        function navigateTo(pageId, params = {}) {
            window.location.hash = pageId + (params.id ? `?id=${params.id}` : '') + (params.type ? `&type=${params.type}` : '');
        }

        window.addEventListener('hashchange', router);

        function router() {
            const hash = window.location.hash.slice(1);
            const [path, query] = hash.split('?');
            const pageId = path || 'dashboard';
            
            const urlParams = new URLSearchParams(query);
            const id = urlParams.get('id');
            const type = urlParams.get('type');

            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const targetPage = document.getElementById(`page-${pageId}`);
            if (targetPage) targetPage.classList.add('active');

            document.querySelectorAll('.nav-link').forEach(l => {
                l.classList.toggle('active', l.getAttribute('onclick')?.includes(`'${pageId}'`));
            });

            if (pageId === 'dashboard') renderDashboard();
            if (pageId === 'projects') renderProjects();
            if (pageId === 'timeline') renderTimeline();
            if (pageId === 'project-detail') renderProjectDetail(id);
            if (pageId === 'chekkai') renderChekkaiForm(id, type);
            if (pageId === 'audits') renderAudits();

            lucide.createIcons();
            window.scrollTo(0, 0);
        }

        // --- RENDERING ---
        function renderDashboard() {
            const ongoing = projects.filter(p => p.status === 'In Progress' || p.status === 'To be started');
            const onhold = projects.filter(p => p.status === 'On Hold');
            const completed = projects.filter(p => p.status === 'Completed');

            document.getElementById('count-ongoing').innerText = ongoing.length.toString().padStart(2, '0');
            document.getElementById('count-onhold').innerText = onhold.length.toString().padStart(2, '0');
            document.getElementById('count-completed').innerText = completed.length.toString().padStart(2, '0');

            const renderKanban = (list, containerId) => {
                document.getElementById(containerId).innerHTML = list.map(p => `
                    <div onclick="navigateTo('project-detail', {id: '${p.id}'})" class="bg-[#141414] border border-[#262626] p-5 rounded-2xl cursor-pointer hover:border-[#007AFF]/50 transition-all group">
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-[9px] font-mono font-bold text-[#007AFF]">${p.code}</span>
                            <i data-lucide="more-horizontal" class="w-3 h-3 text-[#525252]"></i>
                        </div>
                        <h4 class="text-sm font-black text-white leading-tight mb-2 tracking-tight">
                            ${p.carline} ${p.dptPhase} | ${p.name}
                        </h4>
                        <div class="text-[9px] font-black text-[#525252] uppercase tracking-widest mb-4">Start: ${p.plannedStart}</div>
                        <div class="flex items-center justify-between">
                            <div class="flex -space-x-2">
                                <div class="w-6 h-6 rounded-full bg-[#1F1F1F] border border-[#262626] flex items-center justify-center text-[8px] font-black">${p.owner[0]}</div>
                            </div>
                            <div class="flex items-center gap-2">
                                <div class="w-24 h-1 bg-[#1F1F1F] rounded-full overflow-hidden">
                                    <div class="bg-[#007AFF] h-full" style="width: ${p.progress}%"></div>
                                </div>
                                <span class="text-[10px] font-mono font-bold text-[#A1A1A1]">${p.progress}%</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            };

            renderKanban(ongoing, 'kanban-ongoing');
            renderKanban(onhold, 'kanban-onhold');
            renderKanban(completed, 'kanban-completed');
        }

        function renderProjects() {
            document.getElementById('projects-table-body').innerHTML = projects.map(p => `
                <tr onclick="navigateTo('project-detail', {id: '${p.id}'})" class="hover:bg-[#0F0F0F] transition-all cursor-pointer group">
                    <td class="px-8 py-5">
                        <div class="flex flex-col">
                            <span class="text-xs font-mono font-black text-[#007AFF] tracking-tighter">${p.code}</span>
                        </div>
                    </td>
                    <td class="px-8 py-5">
                        <div class="flex flex-col">
                            <span class="text-sm font-black text-white uppercase tracking-tight">${p.carline} ${p.dptPhase}</span>
                            <span class="text-[10px] text-[#A1A1A1] font-bold uppercase tracking-widest">${p.name}</span>
                        </div>
                    </td>
                    <td class="px-8 py-5">
                        <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-[9px] font-black uppercase tracking-widest ${p.status === 'On Hold' ? 'text-gray-400 bg-gray-400/10 border border-gray-400/20' : p.status === 'Completed' ? 'text-emerald-500 bg-emerald-500/10 border border-emerald-500/20' : p.status === 'To be started' ? 'text-amber-500 bg-amber-500/10 border border-amber-500/20' : 'text-[#007AFF] bg-[#007AFF]/10 border border-[#007AFF]/20'}">
                            <span class="w-1.5 h-1.5 rounded-full ${p.status === 'On Hold' ? 'bg-gray-400' : p.status === 'Completed' ? 'bg-emerald-500' : p.status === 'To be started' ? 'bg-amber-500' : 'bg-[#007AFF]'}"></span>
                            ${p.status}
                        </span>
                    </td>
                    <td class="px-8 py-5">
                        <div class="flex items-center gap-2">
                             <div class="w-7 h-7 rounded-full bg-[#141414] border border-[#262626] flex items-center justify-center text-[9px] font-black">${p.owner[0]}</div>
                             <span class="text-[10px] font-bold text-[#A1A1A1]">${p.owner}</span>
                        </div>
                    </td>
                    <td class="px-8 py-5 text-right">
                        <div class="flex flex-col items-end gap-1">
                            <span class="text-[10px] font-mono font-bold text-white">${p.progress}%</span>
                            <div class="w-24 h-1 bg-[#1F1F1F] rounded-full overflow-hidden">
                                <div class="bg-[#007AFF] h-full" style="width: ${p.progress}%"></div>
                            </div>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
        
        function getDayOfYear(dateStr) {
            const d = new Date(dateStr);
            const start = new Date(d.getFullYear(), 0, 0);
            const diff = (d.getTime() - start.getTime()) + ((start.getTimezoneOffset() - d.getTimezoneOffset()) * 60 * 1000);
            return Math.floor(diff / (1000 * 60 * 60 * 24));
        }

        function renderTimeline() {
            document.getElementById('timeline-header').innerHTML = `
                <div class="text-[10px] font-black text-[#525252] uppercase tracking-[0.2em] px-4">Project Architecture</div>
                ${months.map(m => `<div class="text-center text-[10px] font-black text-[#525252] uppercase tracking-widest">${m}</div>`).join('')}
            `;

            document.getElementById('timeline-rows').innerHTML = projects.map(p => {
                const ps = (getDayOfYear(p.plannedStart) / 365) * 100;
                const pe = (getDayOfYear(p.plannedEnd) / 365) * 100;
                const as = p.actualStart ? (getDayOfYear(p.actualStart) / 365) * 100 : null;
                const ae = p.actualEnd ? (getDayOfYear(p.actualEnd) / 365) * 100 : 100;

                return `
                    <div class="grid grid-cols-[300px_repeat(12,1fr)] items-center group">
                        <div class="px-4">
                            <div class="flex flex-col">
                                <span class="text-[9px] font-mono text-[#007AFF] font-bold">${p.code}</span>
                                <span class="text-xs font-black text-white uppercase tracking-tight">${p.carline} ${p.dptPhase} | ${p.name}</span>
                            </div>
                        </div>
                        <div class="col-span-12 h-12 relative border-l border-[#141414]">
                            <div class="absolute inset-0 flex justify-between pointer-events-none opacity-5">
                                ${Array.from({length: 13}).map(() => `<div class="w-px h-full bg-white"></div>`).join('')}
                            </div>
                            <!-- Planned -->
                            <div class="absolute top-2 h-3 bg-white/10 border border-[#262626] rounded-sm" style="left: ${ps}%; width: ${pe - ps}%"></div>
                            <!-- Actual -->
                            ${as !== null ? `
                                <div class="absolute top-6 h-4 bg-[#007AFF] rounded shadow-lg shadow-[#007AFF]/20 border border-[#007AFF]/20" style="left: ${as}%; width: ${ae - as}%"></div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderProjectDetail(id) {
            const p = projects.find(it => it.id === id);
            if (!p) return;

            const start = new Date(p.plannedStart);
            const coveredMonths = [];
            for(let i=0; i<3; i++) {
                const m = new Date(start.getFullYear(), start.getMonth() + i, 1);
                coveredMonths.push(m);
            }

            const getDayPos = (dateStr) => {
                if(!dateStr) return null;
                const d = new Date(dateStr);
                const s = coveredMonths[0].getTime();
                const e = new Date(coveredMonths[2].getFullYear(), coveredMonths[2].getMonth() + 1, 0).getTime();
                return ((d.getTime() - s) / (e - s)) * 100;
            };

            const ps = getDayPos(p.plannedStart);
            const pe = getDayPos(p.plannedEnd);
            const as = getDayPos(p.actualStart);
            const ae = p.actualEnd ? getDayPos(p.actualEnd) : 100;

            document.getElementById('detail-content').innerHTML = `
                <div class="space-y-6">
                    <h1 class="text-5xl font-black text-white tracking-tighter uppercase leading-none">
                        ${p.carline} ${p.dptPhase} <span class="text-[#525252]">|</span> ${p.name}
                    </h1>
                    <div class="flex gap-4">
                        <span class="bg-[#007AFF]/10 text-[#007AFF] border border-[#007AFF]/20 px-3 py-1 rounded text-[10px] font-black uppercase tracking-widest">${p.code}</span>
                        <span class="bg-[#141414] text-[#A1A1A1] border border-[#262626] px-3 py-1 rounded text-[10px] font-bold uppercase tracking-widest">${p.status}</span>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-8 pt-6">
                    <div class="col-span-2 space-y-8">
                        <div class="bg-[#0A0A0A] border border-[#141414] rounded-2xl p-8 shadow-2xl">
                             <h3 class="text-xs font-black uppercase tracking-widest text-[#525252] mb-8 flex items-center gap-2">
                                <i data-lucide="calendar" class="w-4 h-4 text-[#007AFF]"></i> Active Timeline
                            </h3>
                            <div class="relative pt-6 pb-10">
                                <div class="flex border-b border-[#141414] pb-4 mb-6">
                                    ${coveredMonths.map(m => `<div class="flex-1 text-center text-[10px] font-black text-[#525252] uppercase tracking-widest">${months[m.getMonth()]} ${m.getFullYear()}</div>`).join('')}
                                </div>
                                <div class="relative h-24 mt-4">
                                    <div class="absolute inset-x-0 h-full flex pointer-events-none opacity-5">
                                        <div class="flex-1 border-r border-white"></div>
                                        <div class="flex-1 border-r border-white"></div>
                                        <div class="flex-1 border-r border-white"></div>
                                    </div>
                                    <div class="absolute top-2 h-4 bg-white/10 border border-[#262626] rounded-full" style="left: ${ps}%; width: ${pe-ps}%"></div>
                                    ${as !== null ? `
                                        <div class="absolute top-8 h-8 bg-[#007AFF] rounded-lg shadow-xl shadow-[#007AFF]/20 border border-[#007AFF]/20 flex items-center px-4" style="left: ${as}%; width: ${ae-as}%">
                                            <span class="text-[9px] font-black text-white uppercase">Operational Runtime</span>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        </div>

                        <div class="bg-[#0A0A0A] border border-[#141414] rounded-2xl p-8 shadow-xl grid grid-cols-2 gap-8">
                            <div class="space-y-6">
                                <div class="space-y-2">
                                    <label class="text-[10px] font-black text-[#525252] uppercase tracking-widest">Actual Start Date</label>
                                    <input type="date" value="${p.actualStart}" class="w-full bg-[#141414] border border-[#262626] rounded-xl px-4 py-3 text-sm font-bold opacity-60 pointer-events-none">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[10px] font-black text-[#525252] uppercase tracking-widest">Actual End Date</label>
                                    <input type="date" value="${p.actualEnd}" class="w-full bg-[#141414] border border-[#262626] rounded-xl px-4 py-3 text-sm font-bold">
                                </div>
                                <div class="pt-4 border-t border-[#1F1F1F] space-y-4">
                                     <label class="text-[10px] font-black text-[#525252] uppercase tracking-widest">Project Suspension (On Hold)</label>
                                     <button class="w-full bg-amber-500/10 border border-amber-500/20 text-amber-500 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-amber-500 hover:text-white transition-all">Submit Halt Request</button>
                                </div>
                            </div>
                            <div class="bg-[#141414] rounded-2xl p-6 border border-[#262626] flex flex-col justify-between">
                                <div>
                                    <div class="text-[9px] font-black text-[#525252] uppercase tracking-widest mb-4">Integrity Verification</div>
                                    <div class="space-y-4">
                                        <div>
                                            <span class="text-[10px] font-black text-[#A1A1A1] uppercase block mb-1">DPT Phase</span>
                                            <span class="text-sm font-bold text-white">${p.dptPhase} Adherence</span>
                                        </div>
                                        <div>
                                            <span class="text-[10px] font-black text-[#A1A1A1] uppercase block mb-1">Carline System</span>
                                            <span class="text-sm font-bold text-white">${p.carline} Standard</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2 text-[#007AFF]">
                                    <i data-lucide="shield-check" class="w-4 h-4"></i>
                                    <span class="text-[10px] font-black uppercase tracking-widest">Compliance Active</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-8">
                         <div class="bg-[#0A0A0A] border border-[#141414] rounded-2xl p-6 shadow-xl space-y-4">
                            <h3 class="text-xs font-black uppercase tracking-widest text-[#525252] mb-2">Checklists</h3>
                            ${['preprocessingChekkai', 'modelChekkai', 'resultsChekkai'].map(type => `
                                <button onclick="navigateTo('chekkai', {id: '${p.id}', type: '${type}'})" class="w-full flex items-center justify-between p-4 rounded-xl bg-[#141414] border border-[#262626] group hover:border-[#007AFF]/30 transition-all">
                                    <div class="text-left">
                                        <div class="text-[10px] font-black text-white uppercase tracking-widest">${type.replace('Chekkai', '').toUpperCase()} FORM</div>
                                        <div class="text-[8px] text-[#525252] font-black uppercase">Click to open</div>
                                    </div>
                                    <div class="w-6 h-6 rounded-lg border-2 border-[#262626] flex items-center justify-center ${p[type] ? 'bg-emerald-500 border-emerald-400 text-white' : 'group-hover:border-[#007AFF]'}">
                                        ${p[type] ? '<i data-lucide="check" class="w-3.5 h-3.5 stroke-[4px]"></i>' : '<i data-lucide="arrow-right" class="w-3.5 h-3.5 text-[#525252]"></i>'}
                                    </div>
                                </button>
                            `).join('')}
                         </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function renderChekkaiForm(id, type) {
            const p = projects.find(it => it.id === id);
            const title = type.replace('Chekkai', '').toUpperCase();
            document.getElementById('chekkai-content').innerHTML = `
                <div class="space-y-4">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-[#007AFF]/10 flex items-center justify-center text-[#007AFF]">
                            <i data-lucide="clipboard-check" class="w-6 h-6"></i>
                        </div>
                        <div>
                            <h1 class="text-3xl font-black text-white tracking-tighter uppercase">${title} CHEKKAI</h1>
                            <p class="text-[10px] text-[#525252] font-black uppercase tracking-[0.2em] mt-1">Quality Assurance | PRJ-${id}</p>
                        </div>
                    </div>
                </div>

                <div class="bg-[#0A0A0A] border border-[#141414] rounded-2xl p-10 shadow-2xl space-y-10">
                    <div class="space-y-4">
                         <div class="text-xs font-black uppercase tracking-widest text-[#525252] border-b border-[#141414] pb-4 mb-8">Master Checklist</div>
                         ${['Data Consistency Verified', 'Parametric Validation', 'Standard Adherence', 'Boundary Checks'].map(label => `
                            <label class="flex items-center justify-between p-4 bg-[#141414] border border-[#262626] rounded-xl cursor-pointer hover:border-[#007AFF]/30 transition-all group">
                                <span class="text-sm font-bold text-white uppercase tracking-tight">${label}</span>
                                <input type="checkbox" class="w-6 h-6 rounded border-[#262626] bg-[#141414] appearance-none checked:bg-[#007AFF] checked:border-transparent cursor-pointer transition-all">
                            </label>
                         `).join('')}
                    </div>

                    <div class="grid grid-cols-2 gap-8 pt-10 border-t border-[#141414]">
                        <div class="space-y-2">
                             <label class="text-[10px] font-black text-[#525252] uppercase tracking-widest">Sign-off Authority</label>
                             <input type="text" placeholder="Full legal name" class="w-full bg-[#141414] border border-[#262626] rounded-xl px-4 py-3 text-sm outline-none">
                        </div>
                        <div class="space-y-2">
                             <label class="text-[10px] font-black text-[#525252] uppercase tracking-widest">Digital Timestamp</label>
                             <input type="text" value="${new Date().toLocaleString()}" readonly class="w-full bg-[#141414] border border-[#262626] rounded-xl px-4 py-3 text-sm opacity-50 font-mono">
                        </div>
                    </div>

                    <button onclick="navigateTo('project-detail', {id: '${id}'})" class="w-full bg-[#007AFF] text-white py-4 rounded-xl font-black uppercase text-xs tracking-[0.2em] shadow-xl shadow-[#007AFF]/20 hover:brightness-110 transition-all">Authorize Checklist Completion</button>
                </div>
            `;
            lucide.createIcons();
        }

        function renderAudits() {
            document.getElementById('audits-container').innerHTML = audits.map(a => `
                <div class="bg-[#0A0A0A] border border-[#141414] rounded-2xl p-8 shadow-xl space-y-4">
                    <div class="flex justify-between items-start">
                        <div class="text-[10px] font-mono font-black text-[#525252]">${a.time}</div>
                        <div class="w-2 h-2 rounded-full ${a.color}"></div>
                    </div>
                    <div class="space-y-1">
                        <h4 class="text-lg font-black tracking-tight text-white uppercase">${a.event}</h4>
                        <p class="text-sm text-[#A1A1A1] leading-relaxed">${a.desc}</p>
                    </div>
                </div>
            `).join('');
        }

        // --- FORM HANDLERS ---
        function handleNewProject(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            const np = {
                id: `PRJ-2026-${Math.floor(Math.random()*900+100)}`,
                code: `PRJ-2026-${Math.floor(Math.random()*900+100)}`,
                name: fd.get('name'),
                owner: fd.get('owner'),
                responsiblePerson: fd.get('responsible'),
                status: 'In Progress',
                plannedStart: fd.get('plannedStart'),
                plannedEnd: fd.get('plannedEnd'),
                actualStart: new Date().toISOString().split('T')[0],
                actualEnd: '',
                progress: 0,
                priority: 'Medium',
                carline: fd.get('carline'),
                dptPhase: fd.get('dptPhase'),
                preprocessingChekkai: false,
                modelChekkai: false,
                resultsChekkai: false
            };
            projects.unshift(np);
            navigateTo('dashboard');
        }

        // --- INIT ---
        router();
        lucide.createIcons();

    </script>
</body>
</html>
